suite: configmap
templates:
  - templates/configmap.yaml
tests:
  - it: renders an empty config by default because deployment always mounts it
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-token-tumbler
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'prefix: "tt-"'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'repositories:\s*\[\]'

  - it: renders configured repositories
    set:
      config:
        repositories:
          - name: release-test
            groupName: example/release-test
            secretStore: vault
            vaultPath: release/test
            vaultKey: token
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'name: release-test'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'groupName: example/release-test'
