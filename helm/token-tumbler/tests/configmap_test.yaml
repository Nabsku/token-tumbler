suite: configmap
templates:
  - templates/configmap.yaml
tests:
  - it: renders an empty config by default because deployment always mounts it
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-token-tumbler
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'prefix: tt-'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'targets:\s*\[\]'

  - it: renders configured targets
    set:
      config:
        gitlab:
          url: https://gitlab.example.com
        targets:
          - name: release-test
            gitlab:
              type: group
              path: example/release-test
            destination:
              type: vault
              vault:
                path: release/test
                key: token
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'name: release-test'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'url: https://gitlab.example.com'
      - matchRegex:
          path: data["config.yaml"]
          pattern: 'path: example/release-test'
