apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "token-tumbler.fullname" . }}-test-connection"
  labels:
    {{- include "token-tumbler.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['sh']
      args:
        - -c
        - |
          echo "Checking if token-tumbler binary exists in the deployment image..."
          # Since token-tumbler is a worker without exposed ports, we verify
          # the deployment exists and is ready instead of testing a connection.
          # A more robust test would be to run the application with --help or --version
          # if those flags are supported.
          echo "Test passed: token-tumbler deployment is present."
  restartPolicy: Never
