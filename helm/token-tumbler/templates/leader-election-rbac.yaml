{{- if and .Values.leaderElection.enabled .Values.leaderElection.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "token-tumbler.fullname" . }}-leader-election
  labels:
    {{- include "token-tumbler.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "token-tumbler.fullname" . }}-leader-election
  labels:
    {{- include "token-tumbler.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "token-tumbler.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "token-tumbler.fullname" . }}-leader-election
{{- end }}
