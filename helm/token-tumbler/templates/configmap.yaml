apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "token-tumbler.fullname" . }}
  labels:
    {{- include "token-tumbler.labels" . | nindent 4 }}
data:
  config.yaml: |
    prefix: {{ .Values.config.prefix | quote }}
    repositories:
      {{- toYaml .Values.config.repositories | nindent 6 }}
