{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "token-tumbler.serviceAccountName" . }}
  labels:
    {{- include "token-tumbler.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ or .Values.serviceAccount.automount .Values.leaderElection.enabled }}
{{- end }}
