{{- include "token-tumbler.validateReplicaSafety" . -}}
{{- include "token-tumbler.validateProbes" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "token-tumbler.fullname" . }}
  labels:
    {{- include "token-tumbler.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "token-tumbler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if or .Values.podAnnotations .Values.metrics.enabled .Values.metrics.podAnnotations }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if and .Values.metrics.enabled .Values.metrics.podAnnotations }}
        {{- toYaml .Values.metrics.podAnnotations | nindent 8 }}
        {{- end }}
      {{- end }}
      labels:
        {{- include "token-tumbler.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "token-tumbler.serviceAccountName" . }}
      automountServiceAccountToken: {{ or .Values.serviceAccount.automount .Values.leaderElection.enabled }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.existingSecret }}{{ .Values.existingSecret }}{{ else }}{{ include "token-tumbler.fullname" . }}{{ end }}
                  key: GITLAB_TOKEN
            - name: GITLAB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.existingSecret }}{{ .Values.existingSecret }}{{ else }}{{ include "token-tumbler.fullname" . }}{{ end }}
                  key: GITLAB_URL
            - name: TOKEN_TUMBLER_INTERVAL
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.existingSecret }}{{ .Values.existingSecret }}{{ else }}{{ include "token-tumbler.fullname" . }}{{ end }}
                  key: TOKEN_TUMBLER_INTERVAL
            {{- if .Values.leaderElection.enabled }}
            - name: TOKEN_TUMBLER_LEADER_ELECTION_ENABLED
              value: "true"
            - name: TOKEN_TUMBLER_LEADER_ELECTION_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TOKEN_TUMBLER_LEADER_ELECTION_LEASE_NAME
              value: {{ default (include "token-tumbler.fullname" .) .Values.leaderElection.leaseName | quote }}
            - name: TOKEN_TUMBLER_LEADER_ELECTION_IDENTITY
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: TOKEN_TUMBLER_LEADER_ELECTION_LEASE_DURATION
              value: {{ .Values.leaderElection.leaseDuration | quote }}
            - name: TOKEN_TUMBLER_LEADER_ELECTION_RENEW_DEADLINE
              value: {{ .Values.leaderElection.renewDeadline | quote }}
            - name: TOKEN_TUMBLER_LEADER_ELECTION_RETRY_PERIOD
              value: {{ .Values.leaderElection.retryPeriod | quote }}
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: TOKEN_TUMBLER_METRICS_ADDR
              value: ":{{ .Values.metrics.port }}"
            {{- end }}
            {{- if or .Values.env.approleId .Values.existingSecret }}
            - name: APPROLE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.existingSecret }}{{ .Values.existingSecret }}{{ else }}{{ include "token-tumbler.fullname" . }}{{ end }}
                  key: APPROLE_ID
                  optional: true
            {{- end }}
            {{- if or .Values.env.approleSecret .Values.existingSecret }}
            - name: APPROLE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.existingSecret }}{{ .Values.existingSecret }}{{ else }}{{ include "token-tumbler.fullname" . }}{{ end }}
                  key: APPROLE_SECRET
                  optional: true
            {{- end }}
            {{- if or .Values.env.vaultToken .Values.existingSecret }}
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.existingSecret }}{{ .Values.existingSecret }}{{ else }}{{ include "token-tumbler.fullname" . }}{{ end }}
                  key: VAULT_TOKEN
                  optional: true
            {{- end }}
            {{- if or .Values.env.vaultK8sTokenPath .Values.existingSecret }}
            - name: VAULT_K8S_TOKEN_PATH
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.existingSecret }}{{ .Values.existingSecret }}{{ else }}{{ include "token-tumbler.fullname" . }}{{ end }}
                  key: VAULT_K8S_TOKEN_PATH
                  optional: true
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config.yaml
              subPath: config.yaml
            - name: tmp
              mountPath: /tmp
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "token-tumbler.fullname" . }}
        - name: tmp
          emptyDir: {}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.extraContainers }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
