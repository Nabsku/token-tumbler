# Defaults for token-tumbler.

# -- Number of replicas to run. Rendering fails above 1 unless leaderElection.enabled is true.
replicaCount: 1

image:
  # -- Image repository for token-tumbler.
  repository: ghcr.io/nabsku/token-tumbler
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Image tag override. Defaults to the chart appVersion.
  tag: ""

# -- Image pull secrets for private registries.
imagePullSecrets: []

# -- Override the chart name.
nameOverride: ""

# -- Override the full name of resources.
fullnameOverride: ""

# -- Pod annotations.
podAnnotations: {}

# -- Pod labels.
podLabels: {}

# -- Pod-level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Application config rendered into config.yaml.
# See the application docs for the full schema.
config:
  # -- Prefix for token names.
  prefix: tt-
  # -- Repositories or groups whose tokens should be managed.
  repositories: []
    # - groupName: group/example-group
    #   name: test
    #   permissions:
    #     - read_repository
    #   accessLevel: 20
    #   rotationThreshold: 3d
    #   lifetime: 5d
    #   secretStore: vault
    #   gracePeriod: 2d
    #   vaultPath: teams/example/group
    #   vaultKey: gitlab_token
    #   vaultMount: kv

# -- Environment variables for the container.
env:
  # -- GitLab personal access token (required).
  # Prefer existingSecret or an external secrets operator.
  gitlabToken: ""
  # -- GitLab base URL (required).
  gitlabUrl: ""
  # -- Polling interval for token checks (e.g., 5m, 1h).
  tokenTumblerInterval: "5m"
  # -- Vault AppRole ID (required when Vault secret store is used).
  approleId: ""
  # -- Vault AppRole secret (required when Vault secret store is used).
  approleSecret: ""
  # -- Vault token (required when using vaultAuthMethod: token).
  vaultToken: ""
  # -- Optional service account token path override for vaultAuthMethod: kubernetes.
  vaultK8sTokenPath: ""

# -- Use an existing Secret instead of creating one from .Values.env.
# The secret can contain the keys: GITLAB_TOKEN, GITLAB_URL, TOKEN_TUMBLER_INTERVAL,
# APPROLE_ID, APPROLE_SECRET, VAULT_TOKEN, VAULT_K8S_TOKEN_PATH.
existingSecret: ""

serviceAccount:
  # -- Create a service account.
  create: true
  # -- Mount service account API credentials.
  automount: false
  # -- Annotations to add to the service account.
  annotations: {}
  # -- The name of the service account to use.
  name: ""

# -- Resource requests and limits for the token-tumbler container.
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

# -- Node selector for pod scheduling.
nodeSelector: {}

# -- Tolerations for pod scheduling.
tolerations: []

# -- Affinity rules for pod scheduling.
affinity: {}

# -- Topology spread constraints for pod distribution.
topologySpreadConstraints: []

# -- Horizontal Pod Autoscaler config.
# Rendering fails when maxReplicas is above 1 unless leaderElection.enabled is true.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
  behavior: {}

# -- Kubernetes leader election with coordination.k8s.io Lease objects.
# Enable before running more than one replica.
leaderElection:
  enabled: false
  # -- Lease name. Defaults to the chart fullname when empty.
  leaseName: ""
  # -- Lease duration. Must be greater than renewDeadline.
  leaseDuration: 15s
  # -- Renew deadline. Must be greater than retryPeriod.
  renewDeadline: 10s
  # -- Retry period for acquiring/renewing the lease.
  retryPeriod: 2s
  rbac:
    # -- Create Role and RoleBinding for Lease access.
    create: true

# -- Pod Disruption Budget config.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# -- NetworkPolicy config.
networkPolicy:
  enabled: false
  # -- Egress rules. By default, allow HTTPS/HTTP/DNS to anywhere so GitLab, Vault, and AWS APIs can be reached.
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 443
    - to: []
      ports:
        - protocol: TCP
          port: 80
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  # -- Ingress rules. By default, deny all ingress because this is a worker without public ports.
  ingress: []
  # -- Metrics ingress source selectors. Only applied when both networkPolicy.enabled
  # and metrics.enabled are true. When empty, no ingress rule is created for the metrics
  # port (metrics traffic is denied by default).
  # Example:
  #   metricsFrom:
  #     - namespaceSelector:
  #         matchLabels:
  #           name: monitoring
  metricsFrom: []

# -- Extra volumes to mount into the pod.
volumes: []

# -- Extra volume mounts for the container.
volumeMounts: []

# -- Startup probe config.
# When metrics are enabled, probes default to HTTP /healthz on the metrics port.
# Exec probes are not supported by the chart; keep useExec false.
startupProbe:
  enabled: false
  useExec: false
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# -- Liveness probe config.
# When metrics are enabled, probes default to HTTP /healthz on the metrics port.
# Exec probes are not supported by the chart; keep useExec false.
livenessProbe:
  enabled: false
  useExec: false
  initialDelaySeconds: 30
  periodSeconds: 60
  failureThreshold: 3

# -- Metrics config.
# The application exposes a Prometheus-compatible /metrics endpoint and /healthz
# endpoint on its internal HTTP server. Disabling metrics below removes chart
# exposure for that port; it does not turn off the application's internal server.
metrics:
  # -- Expose metrics in the pod spec and related Kubernetes resources.
  enabled: true
  # -- Port for the metrics HTTP server.
  port: 9090
  # -- Pod annotations for Prometheus scraping (when not using ServiceMonitor).
  podAnnotations: {}
    # prometheus.io/scrape: "true"
    # prometheus.io/port: "9090"
    # prometheus.io/path: "/metrics"

  # -- Metrics Service config.
  service:
    # -- Create a Service resource for the metrics endpoint.
    enabled: true
    # -- Service type.
    type: ClusterIP
    # -- Service port.
    port: 9090
    # -- Service target port (container port).
    targetPort: 9090
    # -- Additional annotations for the metrics Service.
    annotations: {}

  # -- ServiceMonitor config for the Prometheus Operator.
  serviceMonitor:
    # -- Create a ServiceMonitor resource.
    enabled: false
    # -- Namespace for the ServiceMonitor (defaults to release namespace).
    namespace: ""
    # -- Additional labels for the ServiceMonitor (e.g. release: prometheus).
    additionalLabels: {}
    # -- Scrape interval.
    interval: 30s
    # -- Scrape timeout.
    scrapeTimeout: ""
    # -- Metric relabeling config.
    metricRelabelings: []
    # -- Relabeling config.
    relabelings: []

# -- Extra environment variables.
extraEnv: []

# -- Override the container entrypoint.
command: []

# -- Override the container arguments.
args: []

# -- Extra environment variables from ConfigMap/Secret sources.
extraEnvFrom: []

# -- Extra containers to run in the pod.
extraContainers: []

# -- Init containers to run before the main container.
initContainers: []
