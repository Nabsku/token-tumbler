# yaml-language-server: $schema=https://raw.githubusercontent.com/Nabsku/token-tumbler/main/config.schema.json

# Prefix for GitLab access token names created by Token Tumbler.
# `tt` and `tt-` belong to the same prefix family during cleanup.
token:
  prefix: tt-

# Each target manages either a GitLab group or project access token.
targets:
  - name: deploy
    gitlab:
      type: group
      path: group/example-group
    generatedToken:
      scopes:
        - read_repository
      accessLevel: reporter
      lifetime: 5d
    rotation:
      threshold: 3d
      gracePeriod: 2d
    destination:
      type: vault
      vault:
        mount: kv
        path: teams/example/group
        key: gitlab_token

  - name: deploy
    gitlab:
      type: project
      path: group/example-project
    generatedToken:
      scopes:
        - read_repository
      accessLevel: reporter
      lifetime: 5d
    rotation:
      threshold: 3d
      gracePeriod: 2d
    destination:
      type: vault
      vault:
        mount: kv
        path: teams/example/project
        key: gitlab_token
