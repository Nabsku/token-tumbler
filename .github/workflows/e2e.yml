name: E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - e2e/**
      - internal/**
      - main.go
      - go.mod
      - go.sum
      - .github/workflows/e2e.yml

permissions:
  contents: read

jobs:
  gitlab-vault:
    name: GitLab and Vault lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Testcontainers E2E suite
        run: go test -tags=e2e -v ./e2e -timeout 30m -count=1
