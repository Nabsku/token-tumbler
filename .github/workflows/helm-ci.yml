name: Helm CI

on:
  pull_request:
    paths:
      - 'helm/**'
      - 'Makefile'
      - '.github/workflows/helm-ci.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'helm/**'
      - 'Makefile'
      - '.github/workflows/helm-ci.yml'

permissions:
  contents: read

jobs:
  helm:
    name: Helm lint and unittest
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v1.0.2

      - name: Run Helm lint
        run: helm lint helm/token-tumbler

      - name: Run Helm unit tests
        run: make helm-test
