name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.43.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm:
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Set chart version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          yq e ".version = \"$VERSION\" | .appVersion = \"$VERSION\"" -i helm/token-tumbler/Chart.yaml

      - name: Check released application image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker run --rm "ghcr.io/${OWNER}/token-tumbler:${VERSION}" --version

      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0

      - name: Create test namespace
        run: |
          kubectl create namespace token-tumbler

      - name: Test Helm deployment in kind
        run: |
          set +e
          VERSION=${GITHUB_REF_NAME#v}
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm upgrade --install token-tumbler helm/token-tumbler \
            --namespace token-tumbler \
            --wait \
            --timeout 2m \
            --set image.repository="ghcr.io/${OWNER}/token-tumbler" \
            --set image.tag="${VERSION}" \
            --set env.gitlabToken=dummy-token \
            --set env.gitlabUrl=https://gitlab.example.com \
            --set config.repositories[0].repoName=group/example-project \
            --set config.repositories[0].name=deploy \
            --set config.repositories[0].permissions[0]=read_repository \
            --set config.repositories[0].accessLevel=20 \
            --set config.repositories[0].rotationThreshold=3d \
            --set config.repositories[0].lifetime=5d \
            --set config.repositories[0].gracePeriod=2d \
            --set config.repositories[0].secretStore=none
          status=$?
          if [ "$status" -ne 0 ]; then
            kubectl get all --namespace token-tumbler
            kubectl describe pods --namespace token-tumbler
            kubectl get events --namespace token-tumbler --sort-by=.lastTimestamp
            kubectl logs --namespace token-tumbler --selector app.kubernetes.io/instance=token-tumbler --all-containers --tail=-1 || true
            exit "$status"
          fi
          helm test token-tumbler --namespace token-tumbler --logs

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: |
          helm package helm/token-tumbler

      - name: Push Helm chart to GHCR
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push token-tumbler-*.tgz "oci://ghcr.io/${OWNER}/charts"
