version: 2

project_name: token-tumbler

before:
  hooks:
    - go mod download

builds:
  - id: token-tumbler
    binary: token-tumbler
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

changelog:
  use: git

dockers_v2:
  - id: token-tumbler
    ids:
      - token-tumbler
    images:
      - ghcr.io/nabsku/token-tumbler
    tags:
      - "{{.Version}}"
      - latest
    dockerfile: Dockerfile.goreleaser
    platforms:
      - linux/amd64
      - linux/arm64

release:
  github:
    owner: nabsku
    name: token-tumbler
