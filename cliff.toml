# git-cliff configuration for generating CHANGELOG.md from conventional commits.
# See https://git-cliff.org/docs/configuration/ for the full schema.

[changelog]
header = """
# Changelog

All notable user-facing changes are documented here and in [GitHub Releases](https://github.com/Nabsku/token-tumbler/releases).

This project follows semantic versioning for tagged releases where practical.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}

### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/Nabsku/token-tumbler/commit/{{ commit.id }}))
{% endfor %}\
{% endfor %}
"""
trim = true
footer = """"""
postprocessors = [
  { pattern = "\\n\\n$", replace = "\n" },
]

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "newest"
topo_order = false

commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "Continuous integration" },
  { message = '^chore\(release\):', skip = true },
  { message = "^chore", group = "Maintenance" },
  { message = "^revert", group = "Reverts" },
  { body = ".*security", group = "Security" },
]

protect_breaking_commits = true
filter_commits = false
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/Nabsku/token-tumbler/issues/$1" },
]
